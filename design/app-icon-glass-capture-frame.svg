<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panelGlass" x1="0" y1="0" x2="320" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.38"/>
      <stop offset="0.38" stop-color="#F3F6FA" stop-opacity="0.22"/>
      <stop offset="0.74" stop-color="#9CA5B2" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#535C68" stop-opacity="0.20"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="16" y1="12" x2="300" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#E8ECF3" stop-opacity="0.56"/>
    </linearGradient>
    <linearGradient id="innerStroke" x1="30" y1="26" x2="286" y2="388" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.16"/>
      <stop offset="1" stop-color="white" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="leftBlob" x1="54" y1="122" x2="252" y2="306" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#73F1D2" stop-opacity="0.82"/>
      <stop offset="0.52" stop-color="#8DDBFF" stop-opacity="0.64"/>
      <stop offset="1" stop-color="#C0AEFF" stop-opacity="0.34"/>
    </linearGradient>
    <linearGradient id="rightBlob" x1="54" y1="116" x2="258" y2="314" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD5B6" stop-opacity="0.84"/>
      <stop offset="0.48" stop-color="#FFC3EA" stop-opacity="0.60"/>
      <stop offset="1" stop-color="#FFE28E" stop-opacity="0.36"/>
    </linearGradient>
    <linearGradient id="topSpec" x1="48" y1="64" x2="246" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.32"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomSweep" x1="62" y1="278" x2="250" y2="298" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.10"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="leftShadow" x="112" y="192" width="452" height="556" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#090C12" flood-opacity="0.16"/>
    </filter>
    <filter id="rightShadow" x="384" y="136" width="452" height="556" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#090C12" flood-opacity="0.18"/>
    </filter>
    <filter id="softBlur" x="-120" y="-120" width="560" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="specBlur" x="-120" y="-120" width="560" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <clipPath id="panelClip">
      <rect width="320" height="420" rx="86"/>
    </clipPath>
    <g id="glassPanelBase">
      <rect width="320" height="420" rx="86" fill="url(#panelGlass)"/>
      <rect x="0.5" y="0.5" width="319" height="419" rx="85.5" stroke="url(#panelStroke)" stroke-opacity="0.60"/>
      <rect x="18" y="18" width="284" height="384" rx="72" stroke="url(#innerStroke)" stroke-width="2"/>
    </g>
    <g id="glassPanelChrome">
      <g clip-path="url(#panelClip)">
        <g filter="url(#softBlur)">
          <ellipse cx="164" cy="220" rx="128" ry="106" fill="var(--blob-fill)"/>
          <ellipse cx="234" cy="316" rx="94" ry="78" fill="white" fill-opacity="0.16"/>
        </g>
        <g filter="url(#specBlur)">
          <ellipse cx="136" cy="86" rx="132" ry="58" fill="url(#topSpec)"/>
        </g>
        <path d="M44 288C106 266 182 262 272 276" stroke="url(#bottomSweep)" stroke-width="10" stroke-linecap="round"/>
      </g>
    </g>
  </defs>

  <g filter="url(#leftShadow)">
    <g transform="translate(178 258) rotate(-32 160 210)">
      <use href="#glassPanelBase"/>
      <g style="--blob-fill:url(#leftBlob)">
        <use href="#glassPanelChrome"/>
      </g>
    </g>
  </g>

  <g filter="url(#rightShadow)">
    <g transform="translate(450 202) rotate(-32 160 210)">
      <use href="#glassPanelBase"/>
      <g style="--blob-fill:url(#rightBlob)">
        <use href="#glassPanelChrome"/>
      </g>
    </g>
  </g>
</svg>
