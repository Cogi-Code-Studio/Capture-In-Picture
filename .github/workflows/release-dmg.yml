name: Release DMG

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload the DMG to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      APP_NAME: CaptureInPicture
      APP_DISPLAY_NAME: Capture In Picture
      PROJECT_PATH: CaptureInPicture.xcodeproj
      SCHEME: CaptureInPicture
      EXPORT_OPTIONS_PLIST: .github/exportOptions/developer-id.plist
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            release_tag="${{ github.event.release.tag_name }}"
          else
            release_tag="${{ inputs.tag }}"
          fi

          release_version="${release_tag#v}"

          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${release_version}" >> "$GITHUB_OUTPUT"

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            BUILD_CERTIFICATE_BASE64
            P12_PASSWORD
            KEYCHAIN_PASSWORD
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_PRIVATE_KEY
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required secret: ${var_name}" >&2
              exit 1
            fi
          done

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Import Developer ID certificate
        id: keychain
        shell: bash
        run: |
          set -euo pipefail

          cert_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/release-signing.keychain-db"

          printf '%s' "$BUILD_CERTIFICATE_BASE64" | openssl base64 -d -A -out "$cert_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"

          developer_id_identity="$(security find-identity -v -p codesigning "$keychain_path" | grep "Developer ID Application" | head -n 1 | sed -E 's/.*"(.+)"/\1/')"

          if [[ -z "$developer_id_identity" ]]; then
            echo "Developer ID Application identity was not found in the imported keychain." >&2
            exit 1
          fi

          echo "path=$keychain_path" >> "$GITHUB_OUTPUT"
          echo "identity=$developer_id_identity" >> "$GITHUB_OUTPUT"

      - name: Restore App Store Connect API key
        id: api-key
        shell: bash
        run: |
          set -euo pipefail

          api_key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$api_key_path"
          chmod 600 "$api_key_path"

          echo "path=$api_key_path" >> "$GITHUB_OUTPUT"

      - name: Archive app
        shell: bash
        run: |
          set -euo pipefail

          archive_path="$RUNNER_TEMP/${APP_NAME}.xcarchive"

          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$archive_path" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ steps.keychain.outputs.identity }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ steps.keychain.outputs.path }}"

      - name: Export signed app
        id: export
        shell: bash
        run: |
          set -euo pipefail

          archive_path="$RUNNER_TEMP/${APP_NAME}.xcarchive"
          export_path="$RUNNER_TEMP/export"

          xcodebuild -exportArchive \
            -archivePath "$archive_path" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -exportPath "$export_path" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ steps.keychain.outputs.path }}"

          app_path="$export_path/${APP_NAME}.app"

          if [[ ! -d "$app_path" ]]; then
            echo "Expected exported app at $app_path" >&2
            exit 1
          fi

          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"

      - name: Verify signature
        shell: bash
        run: |
          set -euo pipefail

          codesign --verify --deep --strict --verbose=2 "${{ steps.export.outputs.app_path }}"
          codesign --display --verbose=4 "${{ steps.export.outputs.app_path }}"

      - name: Create DMG
        id: dmg
        shell: bash
        run: |
          set -euo pipefail

          release_version="${{ steps.release.outputs.version }}"
          dmg_path="$RUNNER_TEMP/${APP_NAME}-${release_version}.dmg"

          scripts/create-dmg-installer.sh \
            "${{ steps.export.outputs.app_path }}" \
            "$dmg_path" \
            "$APP_DISPLAY_NAME"

          echo "path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "asset_name=$(basename "$dmg_path")" >> "$GITHUB_OUTPUT"

      - name: Submit for notarization
        id: notary-submit
        shell: bash
        run: |
          set -euo pipefail

          submission_json="$RUNNER_TEMP/notary-submit.json"

          xcrun notarytool submit "${{ steps.dmg.outputs.path }}" \
            --key "${{ steps.api-key.outputs.path }}" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --output-format json \
            > "$submission_json"

          cat "$submission_json"

          submission_id="$(ruby -rjson -e 'data = JSON.parse(File.read(ARGV[0])); print(data["id"] || data["submissionId"] || "")' "$submission_json")"

          if [[ -z "$submission_id" ]]; then
            echo "Unable to determine notarization submission id." >&2
            exit 1
          fi

          echo "Submitted notarization request: $submission_id"
          echo "submission_id=$submission_id" >> "$GITHUB_OUTPUT"

      - name: Prepare finalize artifact
        id: finalize-artifact
        shell: bash
        run: |
          set -euo pipefail

          dmg_path="${{ steps.dmg.outputs.path }}"
          release_version="${{ steps.release.outputs.version }}"
          artifact_dir="$RUNNER_TEMP/release-dmg-artifact"
          submission_json="$RUNNER_TEMP/notary-submit.json"
          submission_id="${{ steps.notary-submit.outputs.submission_id }}"

          rm -rf "$artifact_dir"
          mkdir -p "$artifact_dir"

          cp "$dmg_path" "$artifact_dir/"
          cp "$submission_json" "$artifact_dir/notarization-submit.json"
          printf '%s\n' "$submission_id" > "$artifact_dir/notarization-submission-id.txt"

          {
            echo "Release tag: ${{ steps.release.outputs.tag }}"
            echo "Release version: $release_version"
            echo "Build run id: $GITHUB_RUN_ID"
            echo "Notarization submission id: $submission_id"
          } > "$artifact_dir/finalize-release.txt"

          {
            echo "### Notarization submitted"
            echo ""
            echo "- Release tag: \`${{ steps.release.outputs.tag }}\`"
            echo "- Build run id: \`$GITHUB_RUN_ID\`"
            echo "- Submission id: \`$submission_id\`"
            echo ""
            echo "After Apple accepts the submission, run **Finalize DMG Release** with this tag and build run id."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "dir=$artifact_dir" >> "$GITHUB_OUTPUT"

      - name: Upload finalize artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dmg-${{ steps.release.outputs.version }}
          path: ${{ steps.finalize-artifact.outputs.dir }}
          if-no-files-found: error
          retention-days: 14
